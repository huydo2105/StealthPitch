# ── StealthPitch ─── Docker Compose for Phala Network dstack ────────
# Multi-service setup: FastAPI backend + Next.js frontend
# The dstack.sock volume mount is REQUIRED for TEE attestation.
# ────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stealthpitch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # ── CRITICAL: Phala dstack TEE socket ──────────────────────
      - /var/run/dstack.sock:/var/run/dstack.sock
      # Persistent vector database
      - chroma_data:/app/chroma_db
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stealthpitch-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma_data:
    driver: local
