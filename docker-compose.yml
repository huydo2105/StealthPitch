# ── StealthPitch ─── Docker Compose ─────────────────────────────────
# Multi-service setup: FastAPI backend + Next.js frontend
# ────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stealthpitch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Phala dstack TEE socket (only available on dstack workers)
      - /var/run/dstack.sock:/var/run/dstack.sock
      # Persistent vector database
      - chroma_data:/app/chroma_db
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ESCROW_CONTRACT_ADDRESS=${ESCROW_CONTRACT_ADDRESS}
      - ETHERLINK_RPC_URL=${ETHERLINK_RPC_URL:-https://node.shadownet.etherlink.com}
      - TEE_PRIVATE_KEY=${TEE_PRIVATE_KEY:-}
      - SECURITY_PROFILE=${SECURITY_PROFILE:-high-value}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${VM_PUBLIC_IP}:8000
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_ESCROW_CONTRACT_ADDRESS: ${ESCROW_CONTRACT_ADDRESS}
        NEXT_PUBLIC_EXPLORER_URL: ${EXPLORER_URL:-https://shadownet.explorer.etherlink.com}
    container_name: stealthpitch-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chroma_data:
    driver: local
